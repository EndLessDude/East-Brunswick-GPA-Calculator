<!DOCTYPE html>
<html>
<head>
    <title>Course Grading</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <style>
        body {
            font-family: 'Raleway', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #11998e, #000000);
            min-height: 100vh;
            color: #fff;
        }

        h1 {
            text-align: center;
            margin: 2rem 0;
        }

        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 90%;
            max-width: 600px;
            background: white;
            color: #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: #11998e;
            color: white;
            font-size: 18px;
        }

        tr:nth-child(even) {
            background: #f0f4ff;
        }

        tr:hover {
            background: #e0e7ff;
        }
    </style>
</head>
<body>
    <!-- Navbar injected by JS -->
    <script src="js/navbar.js"></script>

    <h1>Percent to Letter Grade</h1>

    <table>
        <tr>
            <th>Percent</th>
            <th>Letter Grade</th>
        </tr>
        <tr><td>98 - 100</td><td>A+</td></tr>
        <tr><td>92 - 97</td><td>A</td></tr>
        <tr><td>90 - 91</td><td>A-</td></tr>
        <tr><td>86 - 89</td><td>B+</td></tr>
        <tr><td>82 - 85</td><td>B</td></tr>
        <tr><td>80 - 81</td><td>B-</td></tr>
        <tr><td>76 - 79</td><td>C+</td></tr>
        <tr><td>72 - 75</td><td>C</td></tr>
        <tr><td>70 - 71</td><td>C-</td></tr>
        <tr><td>66 - 69</td><td>D+</td></tr>
        <tr><td>62 - 65</td><td>D</td></tr>
        <tr><td>60 - 61</td><td>D-</td></tr>
        <tr><td>Below 60</td><td>F</td></tr>
    </table>
</body>
</html>
