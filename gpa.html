<!DOCTYPE html>
<html>
<head>
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
</head>
<body>

    <!-- Navbar -->
    <div id="navbar-container"></div>

    <h1>GPA Calculator</h1>

    <div class="gpa-toggle">
        <button id="weighted-btn" class="active">Weighted GPA</button>
        <button id="unweighted-btn">Unweighted GPA</button>
    </div>

    <div id="courses"></div>

    <button id="add-course-btn">+</button>
    <button id="calculate-btn" onclick="calculateGPA()">Calculate GPA</button>

    <h2 id="result"></h2>

    <!-- Scripts -->
    <script src="js/navbar.js"></script>
    <script src="js/gpa.js"></script>

</body>
</html>
